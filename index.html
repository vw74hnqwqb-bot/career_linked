<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI 진로 연계 수행평가 컨설턴트 - 고등학생의 수행평가를 전공 적합성에 맞게 설계합니다.">
    <title>LinkPath Professional | AI 진로 연계 수행평가 컨설턴트</title>
    
    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@11.0.8/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
        @theme {
            --font-sans: "Pretendard", ui-sans-serif, system-ui, sans-serif;
        }
        @layer base {
            body { @apply bg-slate-50 text-slate-900 antialiased overflow-x-hidden; }
        }
        .bento-card { @apply bg-white rounded-3xl p-6 border border-slate-200 shadow-sm transition-all duration-300 hover:shadow-md hover:border-slate-300; }
        .bento-card-dark { @apply bg-slate-900 rounded-3xl p-6 text-white shadow-lg; }
        .bento-card-indigo { @apply bg-indigo-900 rounded-3xl p-6 text-white overflow-hidden relative shadow-lg; }
        .input-label { @apply text-[10px] text-slate-400 uppercase font-bold tracking-wider mb-1 block; }
        .input-field { @apply w-full h-12 px-5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm font-medium; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // CDN 버전의 Framer Motion은 'Motion'이라는 전역 객체를 사용합니다.
        // 로드 실패 시를 대비해 최소한의 모킹을 제공합니다.
        const motion = window.Motion?.motion || { 
            div: "div", section: "section", h2: "h2", p: "p", footer: "footer", 
            h1: "h1", form: "form", button: "button", span: "span", ul: "ul", li: "li", 
            textarea: "textarea", h3: "h3", h4: "h4" 
        };
        const AnimatePresence = window.Motion?.AnimatePresence || (({children}) => <>{children}</>);

        // --- Lucide Icon Component ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { 
                if (window.lucide) {
                    lucide.createIcons(); 
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- AI Logic ---
        const SYSTEM_PROMPT = `
고등학생 진로 연계 수행평가 컨설턴트입니다. 
융합 공식: [교과 개념] x [진로 도구] = [실천적 산출물]
1차원적 비유 금지. 실무/학술적 쓰임에 집중. 
맞춤형 탐구 전략(결과물 형태 명시)과 멘토의 실전 팁만 출력하세요.
`;

        async function fetchConsulting(subject, career, apiKey) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: `시스템 지침: ${SYSTEM_PROMPT}\n입력주제: ${subject}\n진로: ${career}` }] }]
            };
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        }

        // --- App Component ---
        function App() {
            const [subject, setSubject] = useState('');
            const [career, setCareer] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [apiKey, setApiKey] = useState(localStorage.getItem('GEMINI_KEY') || '');
            const [showKeyModal, setShowKeyModal] = useState(!apiKey);

            const handleAnalyze = async (e) => {
                e.preventDefault();
                if (!apiKey) { setShowKeyModal(true); return; }
                setLoading(true);
                try {
                    const res = await fetchConsulting(subject, career, apiKey);
                    setResult(res);
                } catch (err) {
                    alert('오류: ' + err.message);
                    if (err.message.includes('API_KEY')) setShowKeyModal(true);
                } finally { setLoading(false); }
            };

            const saveKey = (key) => {
                localStorage.setItem('GEMINI_KEY', key);
                setApiKey(key);
                setShowKeyModal(false);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto space-y-6">
                        {/* Header */}
                        <header className="flex justify-between items-center bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white shadow-lg"><Icon name="graduation-cap" size={28} /></div>
                                <div>
                                    <h1 className="text-xl font-bold text-slate-900">CareerPath Pro</h1>
                                    <p className="text-[10px] text-indigo-600 font-bold uppercase tracking-widest">AI Career Consulting System</p>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setShowKeyModal(true)} className="p-2 hover:bg-slate-100 rounded-xl transition-colors"><Icon name="key" size={18} className="text-slate-400" /></button>
                            </div>
                        </header>

                        {/* Modals */}
                        <AnimatePresence>
                            {showKeyModal && (
                                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                                    <motion.div initial={{ scale: 0.9, opacity: 0 }} animate={{ scale: 1, opacity: 1 }} className="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full">
                                        <h3 className="text-xl font-bold mb-2">🔑 API Key Required</h3>
                                        <p className="text-slate-500 text-sm mb-6">Gemini API 키가 필요합니다. 구글 AI 스튜디오에서 발급받은 키를 입력해주세요.</p>
                                        <input type="password" id="key-input" placeholder="AIza..." className="input-field mb-4" />
                                        <div className="flex gap-2">
                                            <button onClick={() => saveKey(document.getElementById('key-input').value)} className="flex-1 h-12 bg-indigo-600 text-white font-bold rounded-xl">저장 및 시작</button>
                                            <button onClick={() => setShowKeyModal(false)} className="px-4 h-12 bg-slate-100 text-slate-500 rounded-xl font-bold">닫기</button>
                                        </div>
                                    </motion.div>
                                </div>
                            )}
                        </AnimatePresence>

                        {!result ? (
                            <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                                <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="md:col-span-8 bento-card">
                                    <h2 className="text-3xl font-bold text-slate-900 mb-2">수행평가에 <span className="text-indigo-600 underline underline-offset-8 decoration-indigo-100">진로</span>를 더하다.</h2>
                                    <p className="text-slate-500 mb-8 leading-relaxed italic">정보를 구체적으로 적을수록 AI의 제안이 더 정교해집니다.</p>
                                    <form onSubmit={handleAnalyze} className="space-y-6">
                                        <div>
                                            <label className="input-label">Subject & Topic</label>
                                            <textarea value={subject} onChange={e => setSubject(e.target.value)} placeholder="과목과 주제를 상세히 입력하세요..." className="input-field h-32 pt-3 resize-none" required />
                                        </div>
                                        <div>
                                            <label className="input-label">Target Career</label>
                                            <input type="text" value={career} onChange={e => setCareer(e.target.value)} placeholder="희망 진로를 입력하세요..." className="input-field" required />
                                        </div>
                                        <button disabled={loading} className="w-full h-14 bg-indigo-600 hover:bg-slate-900 text-white font-bold rounded-2xl shadow-xl shadow-indigo-100 flex items-center justify-center gap-2 transition-all">
                                            {loading ? <div className="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full" /> : <>탐구 전략 설계하기 <Icon name="arrow-right" size={20} /></>}
                                        </button>
                                    </form>
                                </motion.div>
                                
                                <div className="md:col-span-4 space-y-6">
                                    <div className="bento-card-indigo">
                                        <h3 className="text-xs font-bold uppercase tracking-widest text-indigo-300 mb-2">Fusion Logic</h3>
                                        <p className="text-lg font-bold">교과원리 × 전공도구<br/>= 실천적 산출물</p>
                                    </div>
                                    <div className="bento-card">
                                        <h3 className="text-xs font-bold uppercase tracking-widest mb-4">How To Use</h3>
                                        <ul className="text-[11px] space-y-3 text-slate-600 font-medium">
                                            <li className="flex gap-2"><span>01</span><span>제안된 산출물 형태를 숙지합니다.</span></li>
                                            <li className="flex gap-2"><span>02</span><span>제안 키워드로 학술 자료를 검색합니다.</span></li>
                                            <li className="flex gap-2"><span>03</span><span>탐구 과정을 생기부 세특에 녹여냅니다.</span></li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="grid grid-cols-1 md:grid-cols-12 gap-6 pb-20">
                                <div className="md:col-span-4 bento-card gap-6 flex flex-col items-center text-center">
                                    <div className="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center text-3xl border border-slate-200">👤</div>
                                    <div><h3 className="text-lg font-bold">{career} 지망</h3><p className="text-xs text-indigo-600 font-bold uppercase">Analysis Report</p></div>
                                    <div className="w-full bg-slate-50 p-4 rounded-2xl text-left border border-slate-100">
                                        <p className="input-label">Topic</p><p className="text-sm font-semibold">{subject}</p>
                                    </div>
                                    <button onClick={() => setResult(null)} className="w-full py-3 bg-slate-100 text-slate-600 rounded-xl font-bold flex items-center justify-center gap-2"><Icon name="refresh-ccw" size={16} /> 다시 분석</button>
                                </div>
                                <div className="md:col-span-8 bento-card p-0 overflow-hidden flex flex-col">
                                    <div className="bg-indigo-600 px-8 py-6 text-white flex justify-between items-center"><h3 className="text-lg font-bold flex items-center gap-3"><Icon name="sparkles" /> 🎯 맞춤형 탐구 전략</h3></div>
                                    <div className="p-8 text-slate-600 leading-relaxed text-lg whitespace-pre-wrap">
                                        {result.split('[💡 멘토의 실전 팁]')[0].replace('[🎯 맞춤형 탐구 전략]', '').trim()}
                                    </div>
                                </div>
                                <div className="md:col-span-12 bento-card-dark flex flex-col md:flex-row gap-6 items-center">
                                    <div className="w-20 h-20 shrink-0 bg-white/10 rounded-3xl flex items-center justify-center text-4xl">💡</div>
                                    <div className="flex-1">
                                        <h4 className="text-xl font-bold mb-2">멘토의 실전 팁</h4>
                                        <p className="text-slate-400 text-lg leading-relaxed">{result.split('[💡 멘토의 실전 팁]')[1]?.trim() || "학술적 데이터나 실제 기술 명칭을 인용하여 깊이를 더해보세요."}</p>
                                    </div>
                                </div>
                            </motion.div>
                        )}

                        <footer className="pt-20 pb-12 flex justify-between items-center text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                            <p>© 2026 Career Consulting Lab.</p>
                            <p>AI Powered Academic System</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
